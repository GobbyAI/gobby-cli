# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
inheritance: true

reviews:
  profile: assertive
  path_filters:
    - "!.gobby/plans/completed/**"
    - "!gobby-wiki/**"
    - "!gobby-wiki/.obsidian/**"
    - "!gobby-wiki/_meta/**"
    - "!gobby-wiki/**/*.lock"
    - "!docs/plans/completed/**"
