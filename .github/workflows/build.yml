name: Build

on:
  push:
    branches: [main]
    paths: ['src/**', 'Cargo.toml', 'Cargo.lock', '.github/workflows/build.yml']
  pull_request:
    paths: ['src/**', 'Cargo.toml', 'Cargo.lock', '.github/workflows/build.yml']
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS — embeddings enabled (Metal GPU)
          - os: macos-latest
            target: aarch64-apple-darwin
            features: "--features embeddings"
            install_cmake: true
            cross: false
          - os: macos-13
            target: x86_64-apple-darwin
            features: "--features embeddings"
            install_cmake: true
            cross: false
          # Linux — no embeddings (no Metal)
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            features: "--no-default-features"
            install_cmake: false
            cross: false
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            features: "--no-default-features"
            install_cmake: false
            cross: true
          # Windows — no embeddings
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            features: "--no-default-features"
            install_cmake: false
            cross: false
          - os: windows-latest
            target: aarch64-pc-windows-msvc
            features: "--no-default-features"
            install_cmake: false
            cross: true

    runs-on: ${{ matrix.os }}
    name: ${{ matrix.target }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cmake (macOS)
        if: matrix.install_cmake
        run: brew install cmake

      - name: Install cross-compilation tools (Linux ARM)
        if: matrix.cross && startsWith(matrix.os, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - name: Build
        run: cargo build --release --target ${{ matrix.target }} ${{ matrix.features }}

      - name: Test
        if: "!matrix.cross"
        run: cargo test ${{ matrix.features }}

      - name: Package (Unix)
        if: "!startsWith(matrix.os, 'windows')"
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../gcode-${{ matrix.target }}.tar.gz gcode
          cd ../../..

      - name: Package (Windows)
        if: startsWith(matrix.os, 'windows')
        run: |
          cd target/${{ matrix.target }}/release
          Compress-Archive -Path gcode.exe -DestinationPath ../../../gcode-${{ matrix.target }}.zip
          cd ../../..

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: gcode-${{ matrix.target }}
          path: |
            gcode-${{ matrix.target }}.tar.gz
            gcode-${{ matrix.target }}.zip

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            gcode-aarch64-apple-darwin/gcode-aarch64-apple-darwin.tar.gz
            gcode-x86_64-apple-darwin/gcode-x86_64-apple-darwin.tar.gz
            gcode-x86_64-unknown-linux-gnu/gcode-x86_64-unknown-linux-gnu.tar.gz
            gcode-aarch64-unknown-linux-gnu/gcode-aarch64-unknown-linux-gnu.tar.gz
            gcode-x86_64-pc-windows-msvc/gcode-x86_64-pc-windows-msvc.zip
            gcode-aarch64-pc-windows-msvc/gcode-aarch64-pc-windows-msvc.zip
          generate_release_notes: true
