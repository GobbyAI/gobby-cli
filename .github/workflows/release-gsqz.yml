name: Release gsqz

on:
  push:
    tags:
      - "gsqz-v*"

permissions:
  contents: write

jobs:
  test:
    name: Test before release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest

      - name: Verify tag matches Cargo.toml version
        # Guards against tag/crate/release drift: installers resolve a version
        # from crates.io and then look for a matching gsqz-v{version} GitHub
        # asset, so the tag, crate version, and release name must align.
        run: |
          set -euo pipefail
          tag="${GITHUB_REF#refs/tags/}"
          tag_version="${tag#gsqz-v}"
          if [ "$tag" = "$tag_version" ]; then
            echo "::error::Tag '$tag' does not start with 'gsqz-v'." >&2
            exit 1
          fi
          cargo_version="$(cargo pkgid -p gobby-squeeze | sed 's/.*@//')"
          if [ "$tag_version" != "$cargo_version" ]; then
            echo "::error::Tag version '$tag_version' does not match crates/gsqz/Cargo.toml version '$cargo_version'." >&2
            exit 1
          fi
          echo "Tag '$tag' aligns with crates/gsqz/Cargo.toml version '$cargo_version'."

      - name: Clippy
        run: cargo clippy -p gobby-squeeze -- -D warnings

      - name: Clippy without default features
        run: cargo clippy -p gobby-squeeze --no-default-features -- -D warnings

      - name: Run tests
        run: cargo nextest run --profile ci -p gobby-squeeze

      - name: Run doctests
        run: cargo test --doc -p gobby-squeeze

      - name: Run tests without default features
        run: cargo nextest run --profile ci -p gobby-squeeze --no-default-features

      - name: Run doctests without default features
        run: cargo test --doc -p gobby-squeeze --no-default-features

  build:
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
            cross: false
          - target: x86_64-apple-darwin
            os: macos-latest
            cross: false
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            cross: false
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            cross: true
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            cross: false
          - target: aarch64-pc-windows-msvc
            os: windows-latest
            cross: true

    runs-on: ${{ matrix.os }}
    name: ${{ matrix.target }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux ARM)
        if: matrix.cross && startsWith(matrix.os, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"

      - name: Configure MSVC for Windows ARM64
        if: matrix.target == 'aarch64-pc-windows-msvc'
        uses: ilammy/msvc-dev-cmd@0b201ec74fa43914dc39ae48a89fd1d8cb592756
        with:
          arch: x64_arm64

      - name: Build gsqz
        run: cargo build --release --target ${{ matrix.target }} -p gobby-squeeze

      - name: Package (Unix)
        if: "!startsWith(matrix.os, 'windows')"
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../gsqz-${{ matrix.target }}.tar.gz gsqz
          cd ../../..

      - name: Package (Windows)
        if: startsWith(matrix.os, 'windows')
        run: |
          cd target/${{ matrix.target }}/release
          Compress-Archive -Path gsqz.exe -DestinationPath ../../../gsqz-${{ matrix.target }}.zip
          cd ../../..

      - name: Upload Unix artifact
        if: "!startsWith(matrix.os, 'windows')"
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: gsqz-${{ matrix.target }}
          path: gsqz-${{ matrix.target }}.tar.gz

      - name: Upload Windows artifact
        if: startsWith(matrix.os, 'windows')
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: gsqz-${{ matrix.target }}
          path: gsqz-${{ matrix.target }}.zip

  publish:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Publish gobby-squeeze to crates.io
        run: cargo publish -p gobby-squeeze
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  release:
    needs: [build, publish]
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Generate SHA-256 checksums
        # Installers fetch <asset>.sha256 and verify the archive before
        # chmod/PATH placement (fail-closed on missing/mismatched checksum).
        run: |
          set -euo pipefail
          shopt -s nullglob
          for asset in gsqz-*.tar.gz gsqz-*.zip; do
            sha256sum "$asset" > "$asset.sha256"
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65
        with:
          files: |
            gsqz-*.tar.gz
            gsqz-*.zip
            gsqz-*.sha256
          generate_release_notes: true
