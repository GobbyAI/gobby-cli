name: Release gwiki

on:
  push:
    tags:
      - "gwiki-v*"

permissions:
  contents: write

jobs:
  test:
    name: Test before release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Verify tag matches Cargo.toml version
        run: |
          set -euo pipefail
          tag="${GITHUB_REF#refs/tags/}"
          tag_version="${tag#gwiki-v}"
          if [ "$tag" = "$tag_version" ]; then
            echo "::error::Tag '$tag' does not start with 'gwiki-v'." >&2
            exit 1
          fi
          cargo_version="$(cargo pkgid -p gobby-wiki | sed 's/.*@//')"
          if [ "$tag_version" != "$cargo_version" ]; then
            echo "::error::Tag version '$tag_version' does not match crates/gwiki/Cargo.toml version '$cargo_version'." >&2
            exit 1
          fi
          echo "Tag '$tag' aligns with crates/gwiki/Cargo.toml version '$cargo_version'."

      - name: Verify published gobby-core supports ai
        run: |
          set -euo pipefail
          core_version="$(python3 - <<'PY'
          import sys
          import tomllib
          from pathlib import Path

          manifest = tomllib.loads(Path("crates/gwiki/Cargo.toml").read_text())
          features = manifest.get("features", {})
          default_features = features.get("default", [])
          ai_features = features.get("ai", [])
          dependency = manifest.get("dependencies", {}).get("gobby-core")

          if not isinstance(dependency, dict):
              print("::error::gobby-wiki must depend on gobby-core with an explicit version.", file=sys.stderr)
              sys.exit(1)

          core_version = dependency.get("version")
          if not core_version:
              print("::error::gobby-wiki's gobby-core dependency must include a crates.io version.", file=sys.stderr)
              sys.exit(1)

          if "ai" not in default_features:
              print("::error::gobby-wiki default features must include ai for release builds.", file=sys.stderr)
              sys.exit(1)

          if "gobby-core/ai" not in ai_features:
              print("::error::gobby-wiki's ai feature must enable gobby-core/ai.", file=sys.stderr)
              sys.exit(1)

          print(core_version)
          PY
          )"
          tmp="$(mktemp -d)"
          trap 'rm -rf "$tmp"' EXIT
          mkdir -p "$tmp/src"
          cat > "$tmp/Cargo.toml" <<EOF
          [package]
          name = "gwiki-core-precondition"
          version = "0.0.0"
          edition = "2024"

          [dependencies]
          gobby-core = { version = "=${core_version}", features = ["ai"] }
          EOF
          echo 'fn main() {}' > "$tmp/src/main.rs"
          cargo metadata --manifest-path "$tmp/Cargo.toml" --format-version 1 > /dev/null
          echo "gobby-core ${core_version} is published on crates.io with the ai feature."

      - name: Clippy
        run: cargo clippy -p gobby-wiki --all-targets -- -D warnings

      - name: Clippy without default features
        run: cargo clippy -p gobby-wiki --no-default-features -- -D warnings

      - name: Run tests
        run: cargo test -p gobby-wiki

      - name: Run tests without default features
        run: cargo test -p gobby-wiki --no-default-features

  build:
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
            cross: false
          - target: x86_64-apple-darwin
            os: macos-latest
            cross: false
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            cross: false
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            cross: true
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            cross: false
          - target: aarch64-pc-windows-msvc
            os: windows-latest
            cross: true

    runs-on: ${{ matrix.os }}
    name: ${{ matrix.target }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux ARM)
        if: matrix.cross && startsWith(matrix.os, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"

      - name: Build gwiki
        run: cargo build --release --target ${{ matrix.target }} -p gobby-wiki

      - name: Package (Unix)
        if: "!startsWith(matrix.os, 'windows')"
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../gwiki-${{ matrix.target }}.tar.gz gwiki
          cd ../../..

      - name: Package (Windows)
        if: startsWith(matrix.os, 'windows')
        run: |
          cd target/${{ matrix.target }}/release
          Compress-Archive -Path gwiki.exe -DestinationPath ../../../gwiki-${{ matrix.target }}.zip
          cd ../../..

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: gwiki-${{ matrix.target }}
          path: |
            gwiki-${{ matrix.target }}.tar.gz
            gwiki-${{ matrix.target }}.zip

  publish:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Publish gobby-wiki to crates.io
        run: cargo publish -p gobby-wiki
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  release:
    needs: [build, publish]
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            gwiki-*.tar.gz
            gwiki-*.zip
          generate_release_notes: true
