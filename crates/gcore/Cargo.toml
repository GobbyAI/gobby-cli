[package]
name = "gobby-core"
version = "0.1.0"
edition = "2024"
rust-version = "1.88"
authors = ["Josh Wilhelmi <hello@gobby.ai>"]
description = "Shared primitives for Gobby CLI tools — project root resolution, bootstrap config, daemon URL helpers"
license = "Apache-2.0"
repository = "https://github.com/GobbyAI/gobby-cli"
homepage = "https://gobby.ai"
keywords = ["gobby", "cli"]
categories = ["development-tools"]

[features]
default = []
indexing = ["dep:ignore", "dep:sha2"]

[dependencies]
anyhow = "1"
dirs = "6"
serde = { version = "1", features = ["derive"], optional = true }
ignore = { version = "0.4", optional = true }
serde_json = "1"
serde_yaml = "0.9"
sha2 = { version = "0.10", optional = true }

[features]
default = []
search = ["dep:serde"]

[dev-dependencies]
tempfile = "3"
